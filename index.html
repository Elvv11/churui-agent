<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贴片机行业情报助手 v3 · 团队共享版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;font-family:-apple-system,"Microsoft YaHei",sans-serif;height:100vh;display:flex}
.sidebar{width:280px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar .user-box{padding:16px;border-bottom:1px solid #e2e8f0}
.sidebar .user-box input{width:100%;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.sidebar .user-box input:focus{border-color:#4f46e5}
.sidebar .user-box .uname{font-size:13px;color:#4f46e5;font-weight:600;margin-top:4px}
.sidebar h3{font-size:12px;color:#64748b;padding:14px 16px 6px;text-transform:uppercase;letter-spacing:.05em}
.sidebar .stat{display:flex;justify-content:space-between;padding:7px 16px;font-size:13px;color:#1e293b}
.sidebar .stat span:last-child{font-weight:700;color:#4f46e5}
.sidebar .btn-sm{display:block;width:calc(100%-32px);margin:4px 16px;padding:7px 0;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#475569;font-size:12px;cursor:pointer;text-align:center;transition:.2s}
.sidebar .btn-sm:hover{background:#f8fafc;border-color:#cbd5e1}
.sidebar .btn-sm.danger{color:#ef4444;border-color:#fecaca}
.sidebar .btn-sm.danger:hover{background:#fef2f2}
.sidebar .online-list{font-size:11px;color:#475569;padding:4px 16px;line-height:1.8}
.sidebar .online-list span{margin-right:6px;display:inline-flex;align-items:center;gap:3px}
.sidebar .dot-live{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block}
.fact-list{flex:1;overflow-y:auto;padding:0 16px}
.fact-item{font-size:11px;color:#475569;padding:6px 0;border-bottom:1px solid #f1f5f9;line-height:1.5}
.fact-item .who{color:#4f46e5;font-weight:600}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.topbar h1{font-size:17px;color:#1e293b}
.topbar .sub{font-size:11px;color:#9ca3af;margin-left:auto}
.topbar .daily-btn{padding:7px 14px;background:#b45309;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.topbar .daily-btn:hover{background:#92400e}
.topbar .daily-btn:disabled{background:#d1d5db;cursor:not-allowed}
.topbar .status{font-size:11px;color:#22c55e;display:flex;align-items:center;gap:4px}
.topbar .status .dot{width:7px;height:7px;border-radius:50%;background:#22c55e}

.chat-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;max-width:900px;width:100%;margin:0 auto}
.msg{display:flex;gap:12px;max-width:100%;animation:in .25s}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.msg.assistant .avatar{background:#eef2ff}
.msg.user .avatar{background:#4f46e5;color:#fff}
.msg .bubble{max-width:80%;padding:14px 18px;border-radius:16px;font-size:15px;line-height:1.8;color:#1e293b}
.msg.assistant .bubble{background:#fff;border:1px solid #e2e8f0;border-top-left-radius:4px}
.msg.user .bubble{background:#4f46e5;color:#fff;border-top-right-radius:4px}
.msg .bubble h2{font-size:17px;color:#b45309;margin:10px 0 6px}
.msg .bubble h3{font-size:15px;color:#4f46e5;margin:8px 0 4px}
.msg .bubble strong{color:#b45309}
.msg .bubble .who-tag{font-size:10px;color:#9ca3af;display:block;margin-top:4px}

.typing .bubble{background:#fff;border:1px solid #e2e8f0;color:#9ca3af;font-size:14px;padding:14px 18px;border-radius:16px;border-top-left-radius:4px}
.typing .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#9ca3af;margin:0 2px;animation:dot 1.4s infinite}
.typing .dots span:nth-child(2){animation-delay:.2s}
.typing .dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.2}30%{opacity:1}}

.input-bar{background:#fff;border-top:1px solid #e2e8f0;padding:16px 24px;display:flex;gap:10px;flex-shrink:0;align-items:center;max-width:900px;width:100%;margin:0 auto}
.input-bar input{flex:1;padding:12px 16px;border:2px solid #e2e8f0;border-radius:12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.input-bar input:focus{border-color:#4f46e5}
.input-bar button{padding:12px 24px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.input-bar button:hover{background:#4338ca}
.input-bar button:disabled{background:#d1d5db;cursor:not-allowed}

.suggestions{display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 12px;max-width:900px;width:100%;margin:0 auto}
.suggestions span{font-size:11px;padding:5px 12px;background:#eef2ff;color:#4f46e5;border-radius:14px;cursor:pointer;transition:.2s}
.suggestions span:hover{background:#e0e7ff}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;animation:tIn .3s}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-ok{background:#22c55e;color:#fff}
.toast-err{background:#ef4444;color:#fff}

@media(max-width:768px){.sidebar{display:none}}
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
 <div class="user-box">
  <input id="name-input" placeholder="👤 输入你的名字..." onchange="setName()" onblur="setName()">
  <div class="uname" id="name-display"></div>
 </div>
 <h3>📊 共享知识库</h3>
 <div class="stat"><span>💬 总对话</span><span id="stat-chats">-</span></div>
 <div class="stat"><span>📚 已验证知识</span><span id="stat-facts">-</span></div>
 <div class="stat"><span>📰 速报存档</span><span id="stat-briefs">-</span></div>
 <div class="stat"><span>👥 贡献者</span><span id="stat-users">-</span></div>
 <button class="btn-sm" onclick="loadSharedFacts()">🔄 刷新知识库</button>
 <button class="btn-sm" onclick="exportKnowledge()">💾 导出知识库</button>
 <h3>📌 最近学到的（全团队）</h3>
 <div class="fact-list" id="fact-list"><div class="fact-item" style="color:#9ca3af">输入名字后加载...</div></div>
</div>

<!-- 主区域 -->
<div class="main">
<div class="topbar">
 <h1>🤖 贴片机行业情报助手 v3</h1>
 <button class="daily-btn" id="daily-btn" onclick="dailyBrief()">⚡ 一键今日速报</button>
 <span class="status"><span class="dot"></span> 云端共享模式</span>
 <span class="sub">全团队共用 · Supabase</span>
</div>

<div class="suggestions" id="suggestions"></div>
<div class="chat-wrap" id="chat"></div>

<div class="input-bar">
 <input type="text" id="user-input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')send()">
 <button id="send-btn" onclick="send()">发送</button>
</div>
</div>

<script>
// ====== Supabase 配置 ======
const SUPABASE_URL = 'https://fiqdpidddzamqtxgmhhv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_b7IywEMyKonprW6BTAYh7Q_6ucx39eo';

// ====== DeepSeek ======
const API_KEY = 'sk-e36a1f2b205747759fee4b6a6c113a21';
const API_URL = 'https://api.deepseek.com/v1/chat/completions';

const SYSTEM_PROMPT = `你是楚瑞智能科技（苏州）有限公司的"贴片机行业情报助手 v3"，团队共享版。

===== 楚瑞智能科技知识库 =====
【公司】楚瑞智能科技（苏州），2021成立，苏州吴江。自研专利：高承载自润型滚珠滑轨、电滑环、磁编码盘、磁栅尺位移测量。

【上游】导轨（THK/NSK/上银）、伺服电机（发那科/安川/松下/汇川）、光栅尺（海德汉/雷尼绍）、工业相机（索尼/基恩士/海康）、气动（SMC/Festo）、飞达（松下/雅马哈）

【竞品】
- 路远智能：自研率>98%，176项IP，磁悬浮+线扫视觉双首创，客户含华为/TCL/格力/富士康/丰田/中国电科/中国航天
- 易通自动化：自研率99%+，240+项IP，群取群贴全球首创，客户含比亚迪/中国航发/中国电子
- 木几智能：自研率>96%，100+项IP，主导首个贴片机国标，客户含立讯/比亚迪/美的/欧普

【下游】3C(38%)/汽车(24%,CAGR15-18%)/通信(18%)/半导体(48→112亿美元)/新能源(80→185亿元)/LED(8%)/医疗军工(12%)

【市场】301.97亿元(2024)，74%进口自日本，国产化率35→52%，贸易逆差~27亿美元

【政策】工信部2026：设备更新补贴15%，门槛100万，SMT贴片机属适配设备

【江浙沪目标客户41家】纽威数控(年采海德汉2527万+NSK2820万)/先导智能(锂电龙头)/迈为科技(光伏)/汇川技术(伺服龙头)/中微公司(刻蚀机)/盛美半导体/联影医疗(CT滑环)/海天国际(注塑机万台级)等

===== 回答规则 =====
1. 优先用知识库，时效性问题用联网搜索
2. 标注来源：知识库 / 联网搜索 / 通用知识
3. 先给结论，再列依据`;

// ====== 用户设置 ======
let userName = localStorage.getItem('agent3_user') || '';

function setName(){
 const v = document.getElementById('name-input').value.trim();
 if(v && v !== userName){
  userName = v;
  localStorage.setItem('agent3_user', userName);
  document.getElementById('name-display').textContent = '✅ ' + userName;
  toast('你好，' + userName + '！', 'ok');
  loadSharedFacts();
 }
}
document.getElementById('name-input').value = userName;
if(userName) document.getElementById('name-display').textContent = '✅ ' + userName;

// ====== Supabase 操作 ======
async function supabasePost(data){
 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
  body: JSON.stringify(data)
 });
 return resp.ok;
}

async function supabaseGet(params){
 const qs = new URLSearchParams(params).toString();
 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data?' + qs, {
  headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
 });
 if(!resp.ok) return [];
 return resp.json();
}

// ====== 共享知识库加载 ======
async function loadSharedFacts(){
 if(!userName) return;
 try {
  const facts = await supabaseGet({ data_type: 'eq.fact', order: 'created_at.desc', limit: '30' });
  document.getElementById('stat-facts').textContent = facts.length > 0 ? '+' + facts.length : '-';
  document.getElementById('fact-list').innerHTML = facts.length > 0
   ? facts.map(f => {
    const c = f.content;
    return `<div class="fact-item"><span class="who">${c.user_name || f.user_name}</span> ${(c.text||'').slice(0,80)}</div>`;
   }).join('')
   : '<div class="fact-item" style="color:#9ca3af">暂无共享知识<br>开始提问吧</div>';

  // 统计
  const [chats, briefs] = await Promise.all([
   supabaseGet({ data_type: 'eq.chat', select: 'id', limit: '1', order: 'created_at.desc' }),
   supabaseGet({ data_type: 'eq.brief', select: 'id', limit: '1', order: 'created_at.desc' })
  ]);
  const userList = await supabaseGet({ select: 'user_name', order: 'created_at.desc', limit: '100' });
  const users = [...new Set(userList.map(u=>u.user_name))];
  document.getElementById('stat-users').textContent = users.length + '人';
 } catch(e){ console.error(e); }
}

// ====== 学习并共享 ======
async function learnAndShare(question, answer){
 if(!userName) return;
 const keySentences = answer.match(/[^。！？\n]+(?:亿[元美元]|万[台个]|%\s*[以左]|家企业|家客户|供应商|关键|核心|龙头)[^。！？\n]*/g);
 if(!keySentences) return;
 for(const s of keySentences){
  if(s.length < 10 || s.length > 300) continue;
  try {
   await supabasePost({ user_name: userName, data_type: 'fact', content: { text: s.trim(), source: question.slice(0,100) } });
  } catch(e){}
 }
}

// ====== AI 调用 ======
let isGenerating = false;
let messages = [{ role: 'system', content: SYSTEM_PROMPT }];

function renderMarkdown(text){
 return text
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>')
  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

function addMsg(role, text, who){
 const chat = document.getElementById('chat');
 const div = document.createElement('div');
 div.className = 'msg ' + (role==='user'?'user':'assistant');
 const avatarText = role==='user' ? (userName||'👤').charAt(0) : '🤖';
 div.innerHTML = `<div class="avatar">${avatarText}</div><div class="bubble">${renderMarkdown(text)}${who?`<span class="who-tag">— ${who}</span>`:''}</div>`;
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

function toast(msg, type){ const t=document.createElement('div');t.className='toast toast-'+(type||'ok');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000); }

async function send(){
 if(isGenerating) return;
 if(!userName){ toast('请先在左侧输入你的名字','err'); return; }
 const input = document.getElementById('user-input');
 const text = input.value.trim();
 if(!text) return;

 input.value = ''; addMsg('user', text);
 messages.push({ role: 'user', content: text });

 // 存对话到 Supabase
 supabasePost({ user_name: userName, data_type: 'chat', content: { question: text } }).catch(()=>{});

 isGenerating = true; document.getElementById('send-btn').disabled = true;

 const typingDiv = document.createElement('div'); typingDiv.className = 'typing';
 typingDiv.innerHTML = '<div class="avatar" style="width:34px;height:34px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🤖</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
 document.getElementById('chat').appendChild(typingDiv);
 document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

 try {
  let searchResults = '';
  try {
   const sq = encodeURIComponent(text);
   const ddg = await fetch(`https://api.duckduckgo.com/?q=${sq}&format=json&no_html=1&skip_disambig=1`);
   const dd = await ddg.json();
   const snips = [];
   if(dd.AbstractText) snips.push(dd.AbstractText);
   if(dd.RelatedTopics) dd.RelatedTopics.slice(0,5).forEach(t=>{if(t.Text)snips.push(t.Text)});
   if(snips.length>0) searchResults = '\n\n【联网搜索】\n'+snips.map((s,i)=>`${i+1}. ${s}`).join('\n');
  } catch(e){}

  const reqMsgs = searchResults ? [...messages, {role:'system',content:searchResults}] : messages;
  const resp = await fetch(API_URL, {
   method:'POST',
   headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
   body:JSON.stringify({model:'deepseek-chat',messages:reqMsgs,temperature:0.7,max_tokens:3000})
  });

  if(!resp.ok){ const err = await resp.json().catch(()=>({})); throw new Error(err.error?.message||`请求失败(${resp.status})`); }

  const data = await resp.json();
  const reply = data.choices?.[0]?.message?.content||'（未返回内容）';

  typingDiv.remove();
  addMsg('assistant', reply, 'Agent');
  messages.push({ role: 'assistant', content: reply });

  // 学习
  learnAndShare(text, reply);

  if(messages.length > 40) messages = [messages[0], ...messages.slice(-20)];

 } catch(e){
  typingDiv.remove();
  addMsg('assistant', `❌ 出错了：${e.message}`);
 } finally {
  isGenerating = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
 }
}

async function dailyBrief(){
 if(isGenerating) return;
 if(!userName){ toast('请先输入名字','err'); return; }
 const today = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
 const prompt = `请生成一份贴片机行业今日动态速报（${today}）。必须联网搜索最新信息。\n## ⚡ 今日行业速报\n### 🔴 重点关注\n### 🟡 行业动向\n### 🟢 楚瑞机会提示\n### 📌 本周建议关注`;
 document.getElementById('user-input').value = prompt;
 send();
 setTimeout(async ()=>{
  try {
   await supabasePost({ user_name: userName, data_type: 'brief', content: { date: new Date().toISOString().slice(0,10) } });
   loadSharedFacts();
  } catch(e){}
 }, 35000);
}

function exportKnowledge(){
 supabaseGet({ data_type: 'eq.fact', order: 'created_at.desc', limit: '500' }).then(facts => {
  const blob = new Blob([JSON.stringify(facts,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `Agent团队知识库_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('知识库已导出（'+facts.length+'条）','ok');
 });
}

function askSuggestion(el){ document.getElementById('user-input').value = el.textContent; send(); }

document.getElementById('suggestions').innerHTML = ['⚡ 一日速报','最近贴片机行业有什么新闻？','纽威数控现在买谁家的导轨？','路远智能的核心零部件自研率多少？'].map(s=>`<span onclick="askSuggestion(this)">${s}</span>`).join('');
document.addEventListener('keydown',function(e){ if(e.ctrlKey&&e.key==='Enter')send(); });
if(userName) loadSharedFacts();
</script>
</body>
</html>
