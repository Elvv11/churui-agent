let _trustedDomains = [];

var HARDCODED_AUTHORITIES = [

function buildTrustedDomains(kb){
  var list = [].concat(HARDCODED_AUTHORITIES);
  try {
    var resources = kb.industryResources;
    if(resources.media){
      resources.media.forEach(function(m){
        if(m.url) list.push({domain: extractDomain(m.url), source: m.name, label:'高可信'});
      });
    }
    if(resources.dataSources){
      resources.dataSources.forEach(function(d){
        if(d.url) list.push({domain: extractDomain(d.url), source: d.name, label:'高可信'});
      });
    }
    if(resources.biddingPlatforms){
      resources.biddingPlatforms.forEach(function(b){
        if(b.url) list.push({domain: extractDomain(b.url), source: b.name, label:'高可信'});
      });
    }
  } catch(e){ console.warn('构建域名白名单失败：'+e.message); }
  _trustedDomains = list;
}

function extractDomain(url){
  try {
    var host = url.replace(/^https?:\/\//,'').replace(/\/.*$/,'').replace(/^www\./,'').toLowerCase();
    return host;
  } catch(e){ return (url||'').toLowerCase(); }
}

function getSourceCredibility(url, title){
  var domain = extractDomain(url||'');
  var match = _trustedDomains.find(function(d){ return domain === d.domain || domain.indexOf(d.domain)>=0 || d.domain.indexOf(domain)>=0; });
  if(match) return {level:'high', label:'高可信', source:match.source, color:'#059669'};
  if(/\.gov\.cn$|\.edu\.cn$|\.org\.cn$/.test(domain)){
    return {level:'medium', label:'中等可信', source:'政府/机构域名', color:'#b45309'};
  }
  if(/36kr|huxiu|geekpark|ifeng|sina|sohu|163\.com|eastmoney|stcn|cls\.cn|yicai/.test(domain)){
    return {level:'medium', label:'中等可信', source:'知名媒体', color:'#b45309'};
  }
  return {level:'low', label:'需核实', source:'未验证来源', color:'#dc2626'};
}

// 查询缓存（localStorage，24小时有效期）
var CACHE_TTL = 24 * 60 * 60 * 1000;

function getSearchCache(query){
  try {
    var raw = localStorage.getItem('agent3_search_cache');
    if(!raw) return null;
    var cache = JSON.parse(raw);
    var key = query.trim().toLowerCase();
    if(cache[key] && (Date.now() - cache[key].ts) < CACHE_TTL){
      return cache[key].data;
    }
    return null;
  } catch(e){ return null; }
}

function setSearchCache(query, results){
  try {
    var raw = localStorage.getItem('agent3_search_cache');
    var cache = raw ? JSON.parse(raw) : {};
    var now = Date.now();
    Object.keys(cache).forEach(function(k){
      if(now - cache[k].ts > CACHE_TTL) delete cache[k];
    });
    var keys = Object.keys(cache);
    if(keys.length >= 50){
      keys.sort(function(a,b){ return cache[a].ts - cache[b].ts; });
      keys.slice(0, keys.length - 49).forEach(function(k){ delete cache[k]; });
    }
    cache[query.trim().toLowerCase()] = {ts: now, data: results};
    localStorage.setItem('agent3_search_cache', JSON.stringify(cache));
  } catch(e){}
}

// 知识库时效性检查
var _kbFreshness = {daysSinceUpdate: null, isStale: false, warning: ''};

function checkKnowledgeFreshness(kb){
  try {
    var lastUpdate = kb.lastUpdated;
    if(!lastUpdate) return;
    var daysSince = Math.floor((Date.now() - new Date(lastUpdate).getTime()) / 86400000);

    } else if(daysSince > 30){

    } else {
      _kbFreshness.isStale = false;
      _kbFreshness.warning = '';
    }
  } catch(e){ _kbFreshness.warning = ''; }
}

	async function loadKnowledgeBase(){
	 try {
	  var resp = await fetch('knowledge_base.json');
	  if(!resp.ok) throw new Error('HTTP ' + resp.status);
	  var kb = await resp.json();
	  // v3.4: 构建信源白名单 + 时效性检查
	  buildTrustedDomains(kb);
	  checkKnowledgeFreshness(kb);
	  SYSTEM_PROMPT = buildKnowledgeText(kb) + _kbFreshness.warning + PROMPT_RULES;
	  // 更新消息列表中的系统提示词
	  if(messages.length > 0 && messages[0].role === 'system'){
	   messages[0].content = SYSTEM_PROMPT;
	  }
	  var updateTime = kb.lastUpdated || '未知';
	  console.log('知识库已加载 (v' + (kb.version||'?') + ', 更新于' + updateTime + ', 白名单' + _trustedDomains.length + '条, 距今' + (_kbFreshness.daysSinceUpdate||'?') + '天)');
	  // v3.4: 如果知识库过期，在页面顶部显示提醒
	  if(_kbFreshness.isStale){
	   showFreshnessBanner();
	  }
	 } catch(e){
	  console.warn('知识库加载失败，使用兜底提示词：' + e.message);
	  SYSTEM_PROMPT = FALLBACK_PROMPT;
	  if(messages.length > 0 && messages[0].role === 'system'){
	   messages[0].content = SYSTEM_PROMPT;
	  }
	 }
	}

	// v3.4: 知识库过期页面顶部提醒
	function showFreshnessBanner(){
	 var existing = document.getElementById('freshness-banner');
	 if(existing) existing.remove();
	 var days = _kbFreshness.daysSinceUpdate;
	 if(!_kbFreshness.isStale || !days) return;
	 var severity = days > 90 ? '严重' : '';
	 var color = days > 90 ? '#dc2626' : '#b45309';
	 var banner = document.createElement('div');
	 banner.id = 'freshness-banner';
	 banner.style.cssText = 'background:'+color+';color:#fff;text-align:center;padding:6px 16px;font-size:13px;font-weight:600;flex-shrink:0;cursor:pointer';
	 banner.title = '点击查看 knowledge_base.json 更新指南';

	 banner.onclick = function(){ window.open('https://github.com/Elvv11/churui-agent/blob/master/knowledge_base_SOP.md','_blank'); };
	 var topbar = document.querySelector('.topbar');
	 if(topbar) topbar.parentNode.insertBefore(banner, topbar);
	}

	// 页面初始化：先用兜底提示词，loadKnowledgeBase() 完成后自动替换
	SYSTEM_PROMPT = FALLBACK_PROMPT;

// ====== Supabase 操作 ======
async function supabasePost(data){
 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
  body: JSON.stringify(data)
 });
 return resp.ok;
}

async function supabaseGet(params){
 const qs = new URLSearchParams(params).toString();
 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data?' + qs, {
  headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
 });
 if(!resp.ok) return [];
 return resp.json();
}

async function supabasePatch(id, data){
	 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data?id=eq.' + encodeURIComponent(id), {
	  method: 'PATCH',
	  headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
	  body: JSON.stringify(data)
	 });
	 return resp.ok;
}

async function supabaseDelete(id){
	 const resp = await fetch(SUPABASE_URL + '/rest/v1/agent_data?id=eq.' + encodeURIComponent(id), {
	  method: 'DELETE',
	  headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
	 });
	 return resp.ok;
}

// ====== 共享知识库加载 ======
let _allFacts = [];
let _currentFilter = '全部';

async function loadSharedFacts(category){
	 if(!userName) return;
	 if(!category) category = _currentFilter;
	 _currentFilter = category;
	 try {
	  var allFacts = await supabaseGet({ data_type: 'eq.fact', order: 'created_at.desc', limit: '200' });
	  _allFacts = allFacts;
	  // 按分类筛选
		  // 过滤掉已删除的
	  var facts = category === '全部' ? allFacts : allFacts.filter(function(f){
	   var c = f.content || {};
	   return c.category === category;
	  });
		  // 过滤已删除的知识
		  facts = facts.filter(function(f){ var c = f.content || {}; return c.status !== 'deleted'; });
	  facts = facts.slice(0, 30);

	  document.getElementById('stat-facts').textContent = facts.length > 0 ? '+' + facts.length : '-';
	  document.getElementById('fact-list').innerHTML = facts.length > 0
	   ? facts.map(function(f){
	    var c = f.content || {};
	    var cat = c.category || '其他';
	    var colors = {'产品':'#4f46e5','竞品':'#b45309','客户':'#059669','零部件':'#0891b2','政策':'#dc2626','其他':'#9ca3af'};
	    var catColor = colors[cat] || '#9ca3af';
		    var statusIcon = c.status === 'verified' ? ' ✅' : '';
		    return '<div class="fact-item"><span class="who">'+f.user_name+'</span> <span style="font-size:9px;background:'+catColor+';color:#fff;padding:1px 5px;border-radius:8px;margin-right:3px">'+cat+'</span>'+statusIcon+' '+(c.text||'').slice(0,60)
		     + '<span style="float:right;cursor:pointer;opacity:0.5" title="确认" onclick="event.stopPropagation();verifyFact(\''+f.id+'\')">✅</span>'
		     + '<span style="float:right;cursor:pointer;opacity:0.5;margin-right:4px" title="删除" onclick="event.stopPropagation();deleteFact(\''+f.id+'\')">❌</span>'
		     + '</div>';
	   }).join('')
	   : '<div class="fact-item" style="color:#9ca3af">暂无此类知识<br>切换分类或开始提问</div>';

	  // 统计用户数
	  var userList = await supabaseGet({ select: 'user_name', order: 'created_at.desc', limit: '500' });
	  var users = [...new Set(userList.map(function(u){return u.user_name;}).filter(Boolean))];
	  document.getElementById('stat-users').textContent = users.length > 0 ? users.length + '人' : '-'; loadHistory();
	 } catch(e){ console.error(e); }
}

function filterFacts(cat, el){
	 document.querySelectorAll('.cat-tag').forEach(function(t){ t.style.background='#f1f5f9'; t.style.color='#475569'; });
	 el.style.background='#4f46e5'; el.style.color='#fff';
	 loadSharedFacts(cat);
}

async function verifyFact(id){
	 var ok = await supabasePatch(id, { content: _allFacts.find(function(f){return f.id===parseInt(id);}).content });
	 // Actually we need to update just the status field
	 // Simpler approach: re-fetch and find the fact
	 var fact = _allFacts.find(function(f){ return f.id == id; });
	 if(!fact) return;
	 var c = fact.content || {};
	 c.status = 'verified';
	 await supabasePatch(id, { content: c });
	 fact.content = c;
	 loadSharedFacts();
}

async function deleteFact(id){
	 if(!confirm('确定删除这条知识吗？')) return;
	 await supabaseDelete(id);
	 _allFacts = _allFacts.filter(function(f){ return f.id != id; });
	 loadSharedFacts();
}

// ====== 知识分类（v3.2 - A3新增） ======
function classifyFact(text){
 // 根据内容关键词自动判断知识类别
 var t = text.toLowerCase();
 // 政策类
 if(/政策|补贴|大基金|长臂管辖|制裁|关税|工信部|发改委|国务院|FDPR|出口管制|国产替代政策/.test(t)) return '政策';
 // 竞品类
 if(/路远|易通|木几|ASM|松下|富士|雅马哈|西门子|THK|NSK|安川|发那科|海德汉|雷尼绍|基恩士|SMC|Festo|自研率|市占|对标|竞品/.test(t)) return '竞品';
 // 客户类
 if(/华为|烽火|海康|大华|纽威|先导|迈为|汇川|联影|海天|比亚迪|富士康|格力|TCL|美的|欧普|立讯|客户|采购/.test(t)) return '客户';
 // 产品类
 if(/CR15|C15-ME|C20-ME|滑块|CR系列|CRQ|CD系列|CDC|花键|丝杆|磁栅|编码盘|滑环|磁环|直线电机|空心杯|贴头|模组|楚瑞/.test(t)) return '产品';
 // 零部件类
 if(/导轨|伺服电机|光栅尺|工业相机|气动|飞达|Feeder|编码器|传感器|丝杠|轴承|联轴器|减速器|驱动器|变频器|PLC/.test(t)) return '零部件';
 return '其他';
}

	 // ====== v3.1.2 增强学习正则 ======
	 // 以下关键词数组可按需增减
	 var LEARN_KEYWORDS = [

	  '单价', '报价', '含税', '不含税',
	  '国产化率', '市占率', '市场份额',
	  '一级代理', '总代理', '经销商', '渠道',

	  // ---- 第五类：工艺参数 ----
	  '回流焊', '波峰焊', '选择焊',
	  '倒装焊', 'Flip[\\.\\s]?Chip', 'SiP', 'BGA', 'QFN', 'QFP', 'SOP', 'LGA',

	  '飞拍', '对中', '飞行相机',

	  '清洗工艺', '点胶', '涂覆', '灌封',

	  '发布', '推出', '发布上市',
	  '中标', '中标金额', '中标项目',
	  '导入', '切换', '替换', '更换',
	  '涨价', '降价', '调价',
	  '签约', '战略合作', '达成合作',
	  '扩产', '扩线', '增产',
	  // ---- 第七类：时间与阶段 ----
	  '量产', '批量生产', '小批量', '试产', '打样', '送样',
	  'Q[1-4]', '季度',
	  '截至', '截止',
	  '预计\\d', '计划\\d', '目标\\d',
	  // ---- 第八类：楚瑞自身 ----
	  '楚瑞',

	 ];

	 var LEARN_REGEX = new RegExp('[^。！？\\n]+(?:' + LEARN_KEYWORDS.join('|') + ')[^。！？\\n]*', 'g');

	   if(dup) continue;
	   var cat = classifyFact(s);
	   supabasePost({ user_name: userName, data_type: 'fact', content: { text: txt, source: question.slice(0,100), category: cat } }).catch(function(){});
	  } catch(e){}
	 }
	}


// ====== AI 调用 ======
let isGenerating = false;
let messages = [{ role: 'system', content: SYSTEM_PROMPT }];

function renderMarkdown(text){
	 // 先做基础转义
	 text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

	 // 处理 markdown 表格 → HTML 表格
	 text = text.replace(/(?:^\|?.+\|$\n?)+/gm, function(tableBlock){
	  var lines = tableBlock.trim().split('\n');
	  if(lines.length < 2) return tableBlock;
          // 第二行必须是分隔行（由 |、-、:、空格组成），否则不是表格
          var sepCheck = lines[1].replace(/\s/g,'');
          if(!/^[\|:]?[-:\|]+$/.test(sepCheck)) return tableBlock;
	  var html = '<table style="border-collapse:collapse;width:100%;margin:8px 0;font-size:13px">';
	  var headerCells = lines[0].split('|').filter(function(c){ return c.trim() !== ''; });
	  html += '<thead><tr style="background:#eef2ff">';
	  headerCells.forEach(function(cell){
	   html += '<th style="border:1px solid #e2e8f0;padding:6px 10px;text-align:left;color:#4f46e5">' + cell.trim() + '</th>';
	  });
	  html += '</tr></thead><tbody>';
	  for(var i = 2; i < lines.length; i++){
	   var cells = lines[i].split('|').filter(function(c){ return c.trim() !== ''; });
	   if(cells.length === 0) continue;
	   html += '<tr style="background:#fff">';
	   cells.forEach(function(cell, ci){
	    html += '<td style="border:1px solid #e2e8f0;padding:6px 10px;' + (ci===0?'font-weight:600;color:#1e293b':'color:#475569') + '">' + cell.trim() + '</td>';
	   });
	   html += '</tr>';
	  }
	  html += '</tbody></table>';
	  return html;
	 });

	 // markdown 链接 [文字](URL) → 可点击超链接
	 text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:#4f46e5;text-decoration:underline">$1</a>');

	 // 标题和加粗
	 text = text.replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>')
	  .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');

	 // 处理搜索来源角标 [1][2] → 可点击上标链接
	 if(window._lastSearchSources && window._lastSearchSources.length > 0){
	  window._lastSearchSources.forEach(function(src){
	   text = text.replace(new RegExp('\\['+src.num+'\\]','g'),
	    '<sup><a href="'+src.url+'" target="_blank" title="'+src.title.replace(/"/g,'&quot;')+(src.credibility&&src.credibility.label?' ['+src.credibility.label+']':'')+'" style="color:'+(src.credibility&&src.credibility.color?src.credibility.color:'#4f46e5')+';text-decoration:none;font-weight:700;border-bottom:2px solid '+(src.credibility&&src.credibility.color?src.credibility.color:'#4f46e5')+'">['+src.num+']</a></sup>');
	  });
	 }

	 return text.replace(/\n/g,'<br>');
	}

function addMsg(role, text, who){
 const chat = document.getElementById('chat');
 const div = document.createElement('div');
 div.className = 'msg ' + (role==='user'?'user':'assistant');
 const avatarText = role==='user' ? (userName||'👤').charAt(0) : '🤖';
 div.innerHTML = `<div class="avatar">${avatarText}</div><div class="bubble">${renderMarkdown(text)}${who?`<span class="who-tag">— ${who}</span>`:''}</div>`;
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

function toast(msg, type){ const t=document.createElement('div');t.className='toast toast-'+(type||'ok');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000); }

async function send(){
 if(isGenerating) return;
 if(!userName){ toast('请先在左侧输入你的名字','err'); return; }
 const input = document.getElementById('user-input');
 const text = input.value.trim();
 if(!text) return;

 input.value = ''; addMsg('user', text);
 messages.push({ role: 'user', content: text });

 // 存对话到 Supabase
 var chatId = Date.now(); // 临时ID，用于后续更新

 isGenerating = true; document.getElementById('send-btn').disabled = true;

 const typingDiv = document.createElement('div'); typingDiv.className = 'typing';
 typingDiv.innerHTML = '<div class="avatar" style="width:34px;height:34px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🤖</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>';
 document.getElementById('chat').appendChild(typingDiv);
 document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

 try {
		  // ====== 联网搜索（v3.4 B4 - 缓存+信誉评级+统计） ======
		  let searchResults = '';
		  const searchSources = [];
		  let fromCache = false;
		  try {
		   // B4-1: 先查缓存（24h有效）
		   var cached = getSearchCache(text);
		   if(cached){
		    searchSources.push.apply(searchSources, cached.sources);
		    searchResults = cached.promptText;
		    fromCache = true;
		    console.log('搜索缓存命中（' + searchSources.length + '条来源）');
		   } else {
		   const sq = encodeURIComponent(text);
		   const serpResp = await fetch(`https://serpapi.com/search.json?engine=baidu&q=${sq}&api_key=${SERPAPI_KEY}`);
		   const serpData = await serpResp.json();
		   const items = [];
		   if(serpData.error){ console.warn("SerpAPI\u9519\u8bef: "+serpData.error); }
		   if(serpData.organic_results){
		    serpData.organic_results.slice(0,10).forEach(r => {
		     var snippet = r.snippet || r.title || "";
		     if(snippet) items.push({text: snippet, url: r.link||"", title: r.title||"", credibility: getSourceCredibility(r.link||"", r.title||"")});
		    });
		   }
		   // B4-2: 按信誉排序（高可信优先）
		   items.sort(function(a,b){
		    var order = {high:0, medium:1, low:2};
		    return (order[a.credibility.level]||2) - (order[b.credibility.level]||2);
		   });
		   if(items.length>0){
		    var highCount = items.filter(function(it){return it.credibility.level==='high';}).length;
		    var medCount = items.filter(function(it){return it.credibility.level==='medium';}).length;
		    var lowCount = items.filter(function(it){return it.credibility.level==='low';}).length;
		    searchResults = '\n\n【联网搜索·百度引擎·v3.4信源信誉已评级·引用见角标】\n';
		    searchResults += '（搜索统计：🔵高可信' + highCount + '条 / 🟡中等可信' + medCount + '条 / 🔴需核实' + lowCount + '条。优先采信高可信来源，对需核实来源谨慎引用。）\n';
		    items.forEach((item,i)=>{
		     var credTag = item.credibility ? (item.credibility.level==='high' ? '🔵' : (item.credibility.level==='medium' ? '🟡' : '🔴')) : '';
		     var credSrc = item.credibility ? item.credibility.source : '';
		     searchResults += '['+(i+1)+'] '+credTag+' '+credSrc+'：'+item.text+(item.url?' (URL:'+item.url+')':'')+'\n';
		     if(item.url) searchSources.push({num:i+1,url:item.url,title:item.title.slice(0,80),credibility:item.credibility});
		    });
		    searchResults += '\n请在回答中用[1][2]角标引用，优先采信高可信来源。对标注🔴需核实的来源，必须在引用时提示“此信息来自未验证来源，建议人工核实”。禁止编造搜索结果中没有的具体信息。';
		    // B4-3: 存入缓存
		    setSearchCache(text, {sources: searchSources, promptText: searchResults});
		   } else {
		    const eq = encodeURIComponent(text);
		    searchResults = `\n\n（本次联网搜索未返回有效结果。请基于知识库回答。📎 建议手动搜索：[百度：关键词](https://www.baidu.com/s?wd=${eq})）\n`;
		   }
		   } // end cache else block
		  } catch(e){
		   const eq = encodeURIComponent(text);
		   searchResults = `\n\n（联网搜索失败。请基于知识库回答。📎 建议手动搜索：[百度：关键词](https://www.baidu.com/s?wd=${eq})）\n`;
		  }

		  // 保存搜索来源供 renderMarkdown 使用（v3.4: 含信誉信息+缓存标记）
		  window._lastSearchSources = searchSources;
		  window._searchFromCache = fromCache;

  const reqMsgs = [...messages, {role:'system',content:searchResults}];
  const resp = await fetch(API_URL, {
   method:'POST',
   headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
   body:JSON.stringify({model:'deepseek-chat',messages:reqMsgs,temperature:0.7,max_tokens:3000})
  });

  if(!resp.ok){ const err = await resp.json().catch(()=>({})); throw new Error(err.error?.message||`请求失败(${resp.status})`); }

  const data = await resp.json();
  const reply = data.choices?.[0]?.message?.content||'（未返回内容）';

  typingDiv.remove();
  addMsg('assistant', reply, 'Agent');
  messages.push({ role: 'assistant', content: reply });

  // 学习并共享到云端
  learnAndShare(text, reply);

  if(messages.length > 40) messages = [messages[0], ...messages.slice(-20)];

 } catch(e){
  typingDiv.remove();
  addMsg('assistant', `❌ 出错了：${e.message}`);
 } finally {
  isGenerating = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
 }
}

// ====== 历史对话管理 ======
var _historyCache = [];

function loadHistory(filter){
 var allChats = [];
 supabaseGet({ data_type: 'eq.chat', order: 'created_at.desc', limit: '200' }).then(function(chats){
  allChats = chats;
  if(filter){
   var kw = filter.toLowerCase();
   allChats = allChats.filter(function(c){
    var q = (c.content&&c.content.question||'').toLowerCase();
    var a = (c.content&&c.content.answer||'').toLowerCase();
    return q.indexOf(kw)>=0 || a.indexOf(kw)>=0;
   });
  }
  _historyCache = allChats;
  // 去重：同问题只保留最新
  var seen = {};
  var unique = [];
  allChats.forEach(function(c){
   var q = (c.content&&c.content.question||'').trim();
   if(q && !seen[q]){ seen[q]=true; unique.push(c); }
  });
  unique = unique.slice(0, 50);
  var cats = {'产品':'#4f46e5','竞品':'#b45309','客户':'#059669','零部件':'#0891b2','政策':'#dc2626','其他':'#9ca3af'};
  document.getElementById('history-list').innerHTML = unique.length>0
   ? unique.map(function(c){
    var q = (c.content&&c.content.question||'');
    var summary = (c.content&&c.content.summary)||q.slice(0,30);
    var title = summary.length>35 ? summary.slice(0,35)+'...' : summary;
    var cat = (c.content&&c.content.category)||'其他';
    var cc = cats[cat]||'#9ca3af';
    var qEncoded = q.replace(/\\/g,'\\\\').replace(/'/g,'\\x27').replace(/"/g,'\\x22');
    return '<div class="history-item" onclick="reAsk(this)" data-question="'+qEncoded+'"><div class="hi-title">'+title+'</div><div class="hi-meta"><span>'+c.user_name+'</span><span style="color:'+cc+'">'+cat+'</span></div></div>';
   }).join('')
   : '<div style="font-size:11px;color:#9ca3af;padding:8px;text-align:center">暂无历史对话</div>';
  document.getElementById('stat-chats').textContent = unique.length;
 }).catch(function(){});
}
